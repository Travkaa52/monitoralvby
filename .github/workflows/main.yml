name: Monitor Parser

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Не даём двум прогонам работать параллельно и толкаться за git push —
# если предыдущий ещё не закончил, новый просто встаёт в очередь.
concurrency:
  group: monitor-parser
  cancel-in-progress: false

jobs:
  run-parser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 4

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser (одноразовый догоняющий проход)
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SOURCE_CHANNELS: ${{ secrets.SOURCE_CHANNELS }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python parser.py

      - name: Commit and push targets.json / parser_state.json
        run: |
          git config --global user.name 'monitor-bot'
          git config --global user.email 'actions@users.noreply.github.com'
          git add targets.json parser_state.json
          git diff --cached --quiet && echo "Нет изменений" || git commit -m "Update targets [skip ci]"
          git pull --rebase --autostash
          git push
